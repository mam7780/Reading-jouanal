<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서일기</title>

<style>
body { font-family: sans-serif; padding:20px; background:#f5efe6; }
h1 { text-align:center; }
input, textarea { width:100%; padding:10px; margin:10px 0; }
button { padding:10px; width:100%; background:#c8853a; color:white; border:none; }
.card { background:white; padding:15px; margin-top:10px; border-radius:10px; }
</style>
</head>

<body>

<h1>📚 독서일기</h1>

<input id="title" placeholder="책 제목">
<textarea id="review" placeholder="내용"></textarea>
<button onclick="save()">저장</button>

<div id="list"></div>

<script>
let books = JSON.parse(localStorage.getItem('books') || '[]');

function save() {
  const title = document.getElementById('title').value;
  const review = document.getElementById('review').value;

  if(!title) return alert('제목 입력하세요');

  books.push({title, review});
  localStorage.setItem('books', JSON.stringify(books));

  document.getElementById('title').value = '';
  document.getElementById('review').value = '';

  render();
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  books.forEach((b, i) => {
    list.innerHTML += `
      <div class="card">
        <b>${b.title}</b>
        <p>${b.review}</p>
        <button onclick="del(${i})">삭제</button>
      </div>
    `;
  });
}

function del(i) {
  books.splice(i,1);
  localStorage.setItem('books', JSON.stringify(books));
  render();
}

render();
</script>

</body>
</html>
